kind = "web"
previewPath = "/"
title = "Phone Shop POS"
version = "1.0.0"
id = "artifacts/phone-shop-pos"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18500

[services.development]
run = "pnpm --filter @workspace/phone-shop-pos run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phone-shop-pos", "run", "build" ]
publicDir = "artifacts/phone-shop-pos/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18500"
BASE_PATH = "/"
